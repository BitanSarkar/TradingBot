name: Refresh Cache (Universe + Fundamentals)

on:
  schedule:
    # Once daily at 08:00 IST (02:30 UTC) — before market opens
    - cron: "30 2 * * 1-5"
  workflow_dispatch:        # Also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install nselib requests pandas numpy yfinance beautifulsoup4 lxml

      - name: Refresh universe cache
        run: python bootstrap.py --universe
        # nselib works fine from GitHub Actions IPs (not blocked by NSE)

      - name: Refresh fundamentals cache
        run: python bootstrap.py --fundamentals
        # NSE quote-equity API + Screener.in — not blocked on GitHub runners

      - name: Commit updated caches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/universe.json
          git add cache/fundamentals/
          git diff --cached --quiet || git commit -m "chore: auto-refresh universe + fundamentals cache [skip ci]"
          git push
