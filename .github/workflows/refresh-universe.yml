name: Refresh Universe Cache

on:
  schedule:
    # Every hour, Mon–Fri, OUTSIDE NSE market hours (9:15–15:30 IST = 03:45–10:00 UTC)
    # Runs at UTC 00–03 (IST 05:30–09:30) and UTC 10–23 (IST 15:30–05:30 next day)
    - cron: "0 0-3,10-23 * * 1-5"
  workflow_dispatch:        # Also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install nselib requests pandas numpy

      - name: Refresh universe cache
        run: python bootstrap.py --universe
        # nselib works fine from GitHub Actions IPs (not blocked by NSE)

      - name: Commit updated universe.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cache/universe.json
          git diff --cached --quiet || git commit -m "chore: auto-refresh universe cache [skip ci]"
          git push
